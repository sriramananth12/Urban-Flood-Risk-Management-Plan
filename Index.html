<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Flood Risk Management Programme (UFRMP)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3F6F5;
    --surface:#FFFFFF;
    --line:#DCE3E1;
    --ink:#0F2427;
    --muted:#5C6E6C;
    --water:#0E6BA8;
    --water-deep:#0B4F4A;
    --amber:#C97A2B;
    --green:#2E7D5B;
    --red:#B2453A;
    --wave1:#1487C9;
    --wave2:#0B4F4A;
    --p1:#0E6BA8;
    --p2:#2E7D5B;
    --p3:#C97A2B;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-size:14px;}
  h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;margin:0;letter-spacing:-0.01em;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}
  button{font-family:'Inter',sans-serif;cursor:pointer;}
  ::selection{background:var(--water);color:#fff;}

  .shell{display:flex;min-height:100vh;}
  .sidebar{width:220px;flex-shrink:0;background:var(--water-deep);color:#EAF3F1;padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;padding:0 4px;}
  .brand-mark{width:30px;height:30px;flex-shrink:0;}
  .brand-text{font-family:'Space Grotesk';font-weight:700;font-size:15px;line-height:1.2;}
  .brand-sub{font-size:10px;color:#9FC4BE;font-family:'IBM Plex Mono';letter-spacing:.04em;margin-top:2px;}
  .nav{display:flex;flex-direction:column;gap:2px;}
  .nav button{background:none;border:none;color:#CFE6E2;text-align:left;padding:10px 12px;border-radius:8px;font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:10px;transition:background .15s;}
  .nav button:hover{background:rgba(255,255,255,.07);}
  .nav button.active{background:#EAF3F1;color:var(--water-deep);font-weight:600;}
  .nav-spacer{flex:1;}
  .sidebar-city-list{margin-top:6px;display:flex;flex-direction:column;gap:1px;max-height:260px;overflow:auto;padding-right:2px;}
  .sidebar-city-list button{font-size:12px;padding:7px 12px;color:#F5C77E;}
  .sidebar-city-list button.active{background:#EAF3F1;color:var(--water-deep);font-weight:600;}
  .sidebar-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#7FAAA3;padding:14px 12px 4px;font-family:'IBM Plex Mono';}
  .sidebar-foot{font-size:10.5px;color:#7FAAA3;font-family:'IBM Plex Mono';padding:0 4px;line-height:1.5;}

  .main{flex:1;padding:28px 34px 60px;max-width:1320px;}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
  .page-head h1{font-size:22px;}
  .page-head p{color:var(--muted);font-size:13px;margin-top:4px;}
  .crumb{font-size:12px;color:var(--muted);font-family:'IBM Plex Mono';margin-bottom:6px;}
  .crumb span{cursor:pointer;color:var(--water);}
  .crumb span:hover{text-decoration:underline;}

  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:26px;}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 16px 14px;position:relative;overflow:hidden;}
  .kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;}
  .kpi .value{font-family:'IBM Plex Mono';font-size:24px;font-weight:600;margin-top:6px;color:var(--water-deep);}
  .kpi .sub{font-size:11px;color:var(--muted);margin-top:3px;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;}
  .section-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  .section-title .hint{font-size:11px;color:var(--muted);font-weight:400;font-family:'IBM Plex Mono';}

  .comp-row{display:flex;align-items:center;gap:16px;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
  .comp-row:last-child{border-bottom:none;}
  .comp-row:hover{background:#FAFCFB;}
  .comp-main{flex:1;min-width:0;}
  .comp-main .name{font-weight:600;font-size:14px;}
  .project-num{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 5px;border-radius:5px;background:var(--water-deep);color:#fff;font-family:'IBM Plex Mono';font-size:11px;font-weight:600;margin-right:8px;vertical-align:middle;}
  .comp-main .meta{font-size:11.5px;color:var(--muted);margin-top:2px;font-family:'IBM Plex Mono';}
  .comp-bars{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
  .comp-figs{width:150px;flex-shrink:0;text-align:right;font-family:'IBM Plex Mono';}
  .comp-figs .big{font-weight:600;font-size:14px;}
  .comp-figs .small{font-size:10.5px;color:var(--muted);}

  .barlabel{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:'IBM Plex Mono';margin-bottom:2px;}
  .wave-track{position:relative;height:12px;border-radius:6px;background:#E4ECEB;overflow:hidden;border:1px solid #D5E0DE;}
  .wave-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(100deg,var(--wave1),var(--wave2));border-radius:6px 0 0 6px;}
  .wave-fill::after{content:'';position:absolute;right:-6px;top:0;bottom:0;width:12px;background:inherit;filter:brightness(1.15);clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);opacity:.6;}
  .ledger-track{position:relative;height:12px;border-radius:2px;background:#E4ECEB;overflow:hidden;border:1px solid #D5E0DE;background-image:repeating-linear-gradient(90deg,transparent,transparent 9%,#D5E0DE 9%,#D5E0DE 9.4%);}
  .ledger-fill{position:absolute;top:0;left:0;bottom:0;background:var(--amber);}

  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;font-family:'IBM Plex Mono';}
  .pill.green{background:#E3F1EA;color:var(--green);}
  .pill.amber{background:#FBEEDF;color:var(--amber);}
  .pill.red{background:#F8E7E5;color:var(--red);}
  .pill.blue{background:#E4F1F8;color:var(--water);}
  .pill.p1{background:#E4F1F8;color:var(--p1);}
  .pill.p2{background:#E3F1EA;color:var(--p2);}
  .pill.p3{background:#FBEEDF;color:var(--p3);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line);}
  td{padding:10px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
  tr.clickable:hover{background:#FAFCFB;cursor:pointer;}
  td.num,th.num{font-family:'IBM Plex Mono';text-align:right;}

  .btn{background:var(--water-deep);color:#fff;border:none;padding:9px 16px;border-radius:7px;font-size:13px;font-weight:600;}
  .btn:hover{background:#093f3b;}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--ink);}
  .btn.ghost:hover{background:#F1F5F4;}
  .btn.small{padding:6px 11px;font-size:12px;}

  .form-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
  .form-tabs button{background:var(--surface);border:1px solid var(--line);padding:8px 14px;border-radius:20px;font-size:12.5px;font-weight:500;color:var(--muted);}
  .form-tabs button.active{background:var(--water-deep);color:#fff;border-color:var(--water-deep);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  @media(max-width:720px){.grid2,.grid3{grid-template-columns:1fr;}}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em;}
  .field input, .field select, .field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:7px;font-size:13.5px;font-family:'Inter',sans-serif;background:#fff;}
  .field textarea{resize:vertical;min-height:60px;}
  .field input[type=file]{padding:6px;font-size:12px;}
  .field input:disabled, .field select:disabled{background:#F1F5F4;color:var(--muted);}
  .form-actions{display:flex;gap:10px;margin-top:6px;}
  .divider{height:1px;background:var(--line);margin:18px 0;}
  .empty{color:var(--muted);font-size:13px;padding:24px 0;text-align:center;}
  .msg{padding:10px 14px;border-radius:7px;font-size:12.5px;margin-bottom:14px;display:none;}
  .msg.show{display:block;}
  .msg.ok{background:#E3F1EA;color:var(--green);}
  .msg.err{background:#F8E7E5;color:var(--red);}

  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
  .photo-card{border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff;}
  .photo-card img{width:100%;height:100px;object-fit:cover;display:block;background:#eee;}
  .photo-meta{padding:6px 8px;font-size:10.5px;color:var(--muted);font-family:'IBM Plex Mono';}

  ::-webkit-scrollbar{width:9px;height:9px;}

  /* Print / download */
  .print-fab{
    position:fixed; top:18px; right:22px; z-index:200;
    background:var(--water-deep); color:#fff; border:none; padding:10px 16px;
    border-radius:22px; font-size:13px; font-weight:600; box-shadow:0 3px 10px rgba(15,36,39,.25);
    cursor:pointer;
  }
  .print-fab:hover{ background:#093f3b; }
  .print-only-header{ display:none; }

  @media print{
    .print-fab{ display:none !important; }
    .sidebar{ display:none !important; }
    .shell{ display:block !important; }
    .main{ padding:0 !important; max-width:100% !important; }
    body{ background:#fff !important; }
    .print-only-header{ display:block !important; margin:0 0 16px; padding-bottom:10px; border-bottom:2px solid #0B4F4A; }
    .print-header-title{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; color:#0B4F4A; }
    .print-header-sub{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:#5C6E6C; margin-top:2px; }
    /* Flatten the dark dashboard theme to a light, ink-friendly print version */
    .dash-dark{ background:#fff !important; margin:0 !important; padding:0 !important; }
    .dash-dark .card{ background:#fff !important; border:1px solid #C7D2D0 !important; }
    .dash-dark .kpi{ background:#F6F9F8 !important; border:1px solid #DCE3E1 !important; }
    .dash-dark .kpi .label{ color:#5C6E6C !important; }
    .dash-dark .kpi .value{ color:#0F2427 !important; }
    .dash-dark .kpi .sub{ color:#5C6E6C !important; }
    .dash-dark .section-title{ color:#0F2427 !important; }
    .dash-dark .hint{ color:#5C6E6C !important; }
    .dash-dark table th{ color:#5C6E6C !important; border-color:#DCE3E1 !important; }
    .dash-dark table td{ color:#0F2427 !important; border-color:#DCE3E1 !important; }
    .dash-dark .empty{ color:#5C6E6C !important; }
    .dash-dark .map-note, .dash-dark .map-legend{ color:#5C6E6C !important; }
    .dash-dark .unit-toggle{ background:#F6F9F8 !important; border-color:#DCE3E1 !important; }
    .dash-dark .unit-toggle-label{ color:#5C6E6C !important; }
    .dash-dark .unit-toggle button{ color:#5C6E6C !important; }
    .dash-dark .unit-toggle button.active{ background:#0B4F4A !important; color:#fff !important; }
    .phase-card{ background:#F6F9F8 !important; border:1px solid #DCE3E1 !important; }
    .phase-card-val{ color:#0F2427 !important; }
    /* Hide pure navigation/action chrome, keep data */
    .city-tabs, .form-tabs, .unit-toggle button, .form-actions, #phaseSelect{ display:none !important; }
    .unit-toggle{ display:none !important; }
    .card, .kpi, .comp-row, table{ page-break-inside:avoid; }
    a[onclick], .comp-row, tr.clickable{ cursor:default !important; }
  }
  ::-webkit-scrollbar-thumb{background:#C7D2D0;border-radius:5px;}

  .stepper{position:relative;padding-left:6px;}
  .step{position:relative;padding:0 0 26px 34px;}
  .step:last-child{padding-bottom:2px;}
  .step::before{content:'';position:absolute;left:9px;top:22px;bottom:-4px;width:2px;background:var(--line);}
  .step:last-child::before{display:none;}
  .step.done::before{background:var(--water);}
  .step-dot{position:absolute;left:0;top:2px;width:20px;height:20px;border-radius:50%;background:#E4ECEB;border:2px solid #D5E0DE;display:flex;align-items:center;justify-content:center;}
  .step.done .step-dot{background:var(--water);border-color:var(--water);}
  .step.done .step-dot::after{content:'✓';color:#fff;font-size:11px;font-weight:700;}
  .step-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .step-title{font-weight:600;font-size:13.5px;}
  .step-date{font-family:'IBM Plex Mono';font-size:12px;color:var(--muted);}
  .step-date.pending{color:#B7A98A;font-style:italic;}
  .step-toggle{background:none;border:none;color:var(--water);font-size:11.5px;font-family:'IBM Plex Mono';padding:0;margin-top:4px;}
  .step-comments{margin-top:8px;background:#F6F9F8;border:1px solid var(--line);border-radius:7px;padding:10px 12px;font-size:12.5px;color:var(--muted);line-height:1.6;display:none;}
  .step-comments.show{display:block;}
  .step-extra{margin-top:6px;font-size:12px;color:var(--muted);}
  .obs-box{background:#F6F9F8;border:1px solid var(--line);border-radius:8px;padding:12px 14px;font-size:12.5px;color:var(--ink);line-height:1.6;white-space:pre-wrap;}
  .obs-box.empty-note{color:var(--muted);font-style:italic;}

  /* City tab bar */
  .city-tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:20px;}
  .city-tabs button{background:none;border:none;padding:10px 16px;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;}
  .city-tabs button.active{color:var(--water-deep);font-weight:600;border-bottom-color:var(--water-deep);}

  /* Map */
  .map-wrap{display:flex;gap:22px;flex-wrap:wrap;}
  .map-svg-wrap{flex-shrink:0;width:300px;}
  .map-legend{display:flex;gap:14px;font-size:11.5px;color:var(--muted);margin-top:8px;flex-wrap:wrap;}
  .map-legend span{display:inline-flex;align-items:center;gap:5px;}
  .legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .city-dot{cursor:pointer;stroke:#fff;stroke-width:1.4;transition:r .15s;}
  .city-dot:hover{filter:brightness(1.15);}
  .city-label-svg{font-family:'IBM Plex Mono',monospace;font-size:7.5px;fill:var(--ink);pointer-events:none;}
  .map-note{font-size:10.5px;color:var(--muted);margin-top:6px;font-style:italic;}
  .summary-table-wrap{flex:1;min-width:320px;}

  /* Dashboard dark theme */
  .dash-dark{ background:#0B2124; margin:-28px -34px -60px; padding:28px 34px 60px; border-radius:0; }
  .dash-dark .page-head h1{ color:#EAF3F1; }
  .dash-dark .page-head p{ color:#8FB9B4; }
  .dash-dark .card{ background:#102B2E; border-color:#1E4245; }
  .dash-dark .kpi{ background:#153538; border-color:#22484B; }
  .dash-dark .kpi .label{ color:#8FB9B4; }
  .dash-dark .kpi .value{ color:#EAF3F1; }
  .dash-dark .kpi .sub{ color:#7FA7A2; }
  .dash-dark .section-title{ color:#EAF3F1; }
  .dash-dark .hint{ color:#7FA7A2; }
  .dash-dark table th{ color:#8FB9B4; border-color:#22484B; }
  .dash-dark table td{ color:#DCEEEC; border-color:#22484B; }
  .dash-dark tr.clickable:hover{ background:#173F42; }
  .dash-dark .empty{ color:#7FA7A2; }
  .dash-dark .map-note{ color:#6E9C97; }
  .dash-dark .map-legend{ color:#8FB9B4; }
  .dash-dark .wave-track, .dash-dark .ledger-track{ background:#0B2124; border-color:#22484B; }

  /* Amount unit toggle */
  .unit-toggle{ display:inline-flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:5px 6px; margin-bottom:14px; }
  .unit-toggle-label{ font-size:11px; color:var(--muted); padding:0 4px 0 6px; font-family:'IBM Plex Mono'; }
  .unit-toggle button{ background:none; border:none; padding:5px 11px; border-radius:16px; font-size:12px; font-weight:500; color:var(--muted); }
  .unit-toggle button.active{ background:var(--water-deep); color:#fff; font-weight:600; }
  .dash-dark .unit-toggle{ background:#153538; border-color:#22484B; }
  .dash-dark .unit-toggle-label{ color:#8FB9B4; }
  .dash-dark .unit-toggle button{ color:#B9D8D2; }
  .dash-dark .unit-toggle button.active{ background:#1E6B67; color:#fff; }

  /* Phase overview cards */
  .phase-overview-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  @media(max-width:820px){ .phase-overview-grid{ grid-template-columns:1fr; } }
  .phase-card{ background:#153538; border:1px solid #22484B; border-left-width:4px; border-radius:10px; padding:14px 16px; cursor:pointer; transition:transform .12s, background .12s; }
  .phase-card:hover{ background:#184246; transform:translateY(-1px); }
  .phase-card-p1{ border-left-color:var(--p1); }
  .phase-card-p2{ border-left-color:var(--p2); }
  .phase-card-p3{ border-left-color:var(--p3); }
  .phase-card-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .phase-card-count{ font-size:12px; color:#8FB9B4; font-family:'IBM Plex Mono'; }
  .phase-card-stats{ display:grid; grid-template-columns:1fr 1fr; gap:10px 14px; }
  .phase-card-val{ font-family:'IBM Plex Mono'; font-size:17px; font-weight:600; color:#EAF3F1; }
  .phase-card-lbl{ font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:#7FA7A2; margin-top:2px; }
  .phase-card-note{ font-size:10px; color:#7FA7A2; margin-top:10px; font-style:italic; }

  /* Implementation Gantt */
  .gantt-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:8px;}
  .gantt-header, .gantt-row{display:flex;align-items:stretch;border-bottom:1px solid var(--line);}
  .gantt-header{background:#F6F9F8;}
  .gantt-row:last-child{border-bottom:none;}
  .gantt-row-label{width:260px;flex-shrink:0;padding:9px 12px;font-size:12px;border-right:1px solid var(--line);}
  .gantt-row-name{font-weight:600;line-height:1.35;}
  .gantt-row-meta{font-size:10px;color:var(--muted);margin-top:4px;}
  .gantt-row-cells{display:flex;flex:1;min-width:630px;}
  .gantt-cell{flex:1;min-width:35px;border-right:1px solid #EEF3F2;}
  .gantt-row .gantt-cell{min-height:46px;}
  .gantt-col-label{flex:1;min-width:35px;text-align:center;color:var(--muted);font-family:'IBM Plex Mono';font-size:9px;padding:8px 0;border-right:1px solid #EEF3F2;}
</style>
</head>
<body>

<div class="shell">
  <div class="sidebar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 32 32" fill="none">
        <path d="M16 3C16 3 6 14 6 21a10 10 0 0020 0C26 14 16 3 16 3z" fill="#EAF3F1"/>
        <path d="M9 21a7 7 0 0014 0" stroke="#0B4F4A" stroke-width="1.6" fill="none"/>
      </svg>
      <div>
        <div class="brand-text">Urban Flood Risk<br>Management Programme</div>
        <div class="brand-sub">UFRMP · ALL CITIES</div>
      </div>
    </div>
    <div class="nav">
      <button data-nav="dashboard" class="active">◧ Dashboard</button>
    </div>
    <div class="sidebar-label">Cities</div>
    <div class="sidebar-city-list" id="sidebarCityList"></div>
    <div class="nav-spacer"></div>
    <div class="sidebar-foot">Data is shared across everyone using this dashboard link. Photos stored as embedded images.</div>
  </div>

  <div class="main" id="main"></div>
</div>

<button id="printFab" class="print-fab" onclick="printCurrentPage()" title="Print or save this page as PDF">🖨 Print / Download Report</button>
<div id="printHeader" class="print-only-header">
  <div class="print-header-title">Urban Flood Risk Management Programme (UFRMP)</div>
  <div class="print-header-sub" id="printHeaderSub"></div>
</div>

<script>
/* ---------------------------------------------------------------
   DATA LAYER
--------------------------------------------------------------- */
const SHARED = true;
let STORAGE_OK = true;
const MEMORY_STORE = {};

/* ---------------------------------------------------------------
   SHEETDB DATA STORAGE API LAYER
   Your Google Sheet, turned into a REST API via SheetDB, backs the
   small/structured collections below as one JSON blob per key.
   "works" is too big and fast-growing for that (a single blob is
   already ~46,000 chars, near Google Sheets' ~50,000 char/cell cap),
   so it instead lives as one row per work item in a separate "Works"
   tab in the same sheet. Binary photo data stays on local storage —
   base64 image bytes don't fit in a Sheets cell at all.

const SHEETDB_API_URL = 'https://sheetdb.io/api/v1/0iwffdwftyqd9';
const SHEETDB_SAFE_CELL_LIMIT = 45000; // safety margin under Google Sheets' ~50,000 char/cell ceiling
const SHEETDB_LARGE_KEYS = new Set(); // (works, ganttData, budgetMatrix all now have their own per-row sheet tabs instead)
const SHEETDB_WORKS_SHEET = 'Works'; // tab name — must exist (can be empty) in your Google Sheet
const SHEETDB_GANTT_SHEET = 'Gantt'; // tab name — must exist (can be empty) in your Google Sheet
const SHEETDB_BUDGETMATRIX_SHEET = 'BudgetMatrix'; // tab name — must exist (can be empty) in your Google Sheet
const SHEETDB_KV_SHEET = 'KVStore'; // separate tab for components/dprs/timelines/cityProgrammes/meData — must also exist (can be empty)
const RUNNING_FROM_FILE = location.protocol === 'file:';
// Browsers block fetch() to any remote host from a file:// page (origin "null"),
// no matter how the remote API's CORS is configured. Rather than let every
// save silently hang/fail, we detect this up front and skip SheetDB entirely
// for the session — the app still works fully on local storage, and we tell
// the person how to get Sheet-sync working (serve over http:// instead).
function sheetDbConfigured(){ return !!SHEETDB_API_URL && !RUNNING_FROM_FILE; }
function isPhotoKey(key){ return typeof key==='string' && key.indexOf('photos:')===0; }

function sheetDbUrl(path, sheet){
  const url = new URL(path);
  if(sheet) url.searchParams.set('sheet', sheet);
  return url.toString();
}
async function sheetDbReadSheet(sheet){
  const res = await fetch(sheetDbUrl(SHEETDB_API_URL, sheet));
  if(!res.ok) throw new Error('SheetDB read failed: HTTP '+res.status);
  return await res.json();
}
async function sheetDbImportJson(sheet, rows){
  const res = await fetch(sheetDbUrl(`${SHEETDB_API_URL}/import/json`, sheet), {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ json: rows })
  });
  if(!res.ok) throw new Error('SheetDB import failed: HTTP '+res.status);
  return true;
}
async function sheetDbCreateRow(sheet, row){
  const res = await fetch(sheetDbUrl(SHEETDB_API_URL, sheet), {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ data: row })
  });
  if(!res.ok) throw new Error('SheetDB create row failed: HTTP '+res.status);
  return true;
}
async function sheetDbUpdateRow(sheet, idValue, patch){
  const res = await fetch(sheetDbUrl(`${SHEETDB_API_URL}/id/${encodeURIComponent(idValue)}`, sheet), {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ data: patch })
  });
  if(!res.ok) throw new Error('SheetDB update row failed: HTTP '+res.status);
  return true;
}
async function sheetDbDeleteRow(sheet, idValue){
  const res = await fetch(sheetDbUrl(`${SHEETDB_API_URL}/id/${encodeURIComponent(idValue)}`, sheet), { method: 'DELETE' });

}

function coerceWorkRow(row){

function seedWorkRowsWithMigrations(){
  const rows = deepClone(SEED_DATA.works);
  Object.keys(MIGRATION_PATCH_V2.works||{}).forEach(id=>{
    const w = rows.find(x=>x.id===id); if(w) Object.assign(w, MIGRATION_PATCH_V2.works[id]);
  });
  Object.keys(MIGRATION_PATCH_V3.works||{}).forEach(id=>{
    const w = rows.find(x=>x.id===id); if(w) Object.assign(w, MIGRATION_PATCH_V3.works[id]);
  });
  (MIGRATION_PATCH_V3.newWorks||[]).forEach(nw=>{
    if(!rows.find(x=>x.id===nw.id)) rows.push(deepClone(nw));
  });
  return rows;

  if(sheetDbConfigured()){

      if(Array.isArray(rows) && rows.length) return rows.map(coerceWorkRow);
      const seedRows = seedWorkRowsWithMigrations();
      await sheetDbImportJson(SHEETDB_WORKS_SHEET, seedRows);
      return seedRows;
    }catch(e){

async function sheetDbFind(key){
  const res = await fetch(sheetDbUrl(`${SHEETDB_API_URL}/search?key=${encodeURIComponent(key)}`, SHEETDB_KV_SHEET));
  if(!res.ok) throw new Error('SheetDB search failed: HTTP '+res.status);
  const rows = await res.json();
  return Array.isArray(rows) && rows.length ? rows[0] : null;
}
async function sheetDbSet(key, value){
  const str = String(value);
  if(str.length > SHEETDB_SAFE_CELL_LIMIT){
    throw new Error(`Value for "${key}" is ${str.length} chars — too large for a Google Sheets cell (~50,000 char limit).`);
  }
  const existing = await sheetDbFind(key);
  if(existing){
    const res = await fetch(sheetDbUrl(`${SHEETDB_API_URL}/key/${encodeURIComponent(key)}`, SHEETDB_KV_SHEET), {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ data: { value } })
    });
    if(!res.ok) throw new Error('SheetDB update failed: HTTP '+res.status);
  } else {
    const res = await fetch(sheetDbUrl(SHEETDB_API_URL, SHEETDB_KV_SHEET), {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ data: { key, value } })
    });
    if(!res.ok) throw new Error('SheetDB insert failed: HTTP '+res.status);
  }
  return true;
}

  const res = await fetch(sheetDbUrl(`${SHEETDB_API_URL}/key/${encodeURIComponent(key)}`, SHEETDB_KV_SHEET), { method: 'DELETE' });

}
async function sheetDbList(prefix){
  const res = await fetch(sheetDbUrl(SHEETDB_API_URL, SHEETDB_KV_SHEET));
  if(!res.ok) throw new Error('SheetDB read failed: HTTP '+res.status);
  const rows = await res.json();
  return rows.map(r=>r.key).filter(k=> !prefix || (k && k.startsWith(prefix)));
}


let PERSISTENCE_MODE = 'none'; // 'sheetdb' | 'claude' | 'none' — set in ensureStorage()
function ensureStorage(){
  // Local layer: Claude's built-in storage if present, else an in-memory fallback.
  let local;
  if(typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function' && typeof window.storage.set === 'function'){
    local = window.storage;
    PERSISTENCE_MODE = 'claude';
  } else {
    STORAGE_OK = false;
    local = {
      async get(key, shared){ const k=(shared?'S:':'P:')+key; return (k in MEMORY_STORE) ? {key, value:MEMORY_STORE[k], shared} : null; },
      async set(key, value, shared){ const k=(shared?'S:':'P:')+key; MEMORY_STORE[k]=value; return {key, value, shared}; },
      async delete(key, shared){ const k=(shared?'S:':'P:')+key; delete MEMORY_STORE[k]; return {key, deleted:true, shared}; },
      async list(prefix, shared){ return {keys:[], shared}; }
    };
  }

  if(!sheetDbConfigured()){
    window.storage = local;
    return;
  }
  PERSISTENCE_MODE = 'sheetdb'; // most collections now sync to your Google Sheet; photos/ganttData stay local only

  // SheetDB configured: route small/structured records to your Google Sheet;
  // large blobs and photos stay local. Any SheetDB error (rate limit, network,
  // oversized value) falls back to local storage so the app keeps working.
  window.storage = {
    async get(key, shared){
      if(isPhotoKey(key) || SHEETDB_LARGE_KEYS.has(key)) return local.get(key, shared);
      try{
        const row = await sheetDbFind(key);
        return row ? { key, value: row.value, shared } : null;
      }catch(e){ console.error('SheetDB get error, falling back to local:', e); return local.get(key, shared); }
    },
    async set(key, value, shared){
      if(isPhotoKey(key) || SHEETDB_LARGE_KEYS.has(key)) return local.set(key, value, shared);
      try{ await sheetDbSet(key, value); return { key, value, shared }; }
      catch(e){ console.error('SheetDB set error, falling back to local:', e); return local.set(key, value, shared); }
    },
    async delete(key, shared){
      if(isPhotoKey(key) || SHEETDB_LARGE_KEYS.has(key)) return local.delete(key, shared);
      try{ const ok = await sheetDbDelete(key); return { key, deleted: ok, shared }; }
      catch(e){ console.error('SheetDB delete error, falling back to local:', e); return local.delete(key, shared); }
    },
    async list(prefix, shared){
      try{
        const sheetKeys = await sheetDbList(prefix);
        const localRes = await local.list(prefix, shared);
        const localKeys = (localRes && localRes.keys) || [];
        return { keys: [...new Set([...sheetKeys, ...localKeys])], shared };
      }catch(e){ console.error('SheetDB list error, falling back to local:', e); return local.list(prefix, shared); }
    }
  };
}

async function loadArr(key){
  try{ const r = await window.storage.get(key, SHARED); return r && r.value ? JSON.parse(r.value) : []; }
  catch(e){ return []; }
}
async function saveArr(key, arr){
  try{ await window.storage.set(key, JSON.stringify(arr), SHARED); return true; }

function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
/* Deep-clone a seed/template object so the constant it came from (SEED_DATA, CITY_SEED, …)
   is never mutated by live CRUD operations on DB. DB is the dynamic, stateful, persisted copy;
   the SEED_* constants stay pure, reusable templates (e.g. if storage is ever cleared and
   the app needs to reseed, it reseeds from the pristine original, not a previously-edited one). */
function deepClone(value){
  if(value === undefined || value === null) return value;
  if(typeof structuredClone === 'function'){
    try{ return structuredClone(value); }catch(e){ /* fall through to JSON clone */ }
  }
  return JSON.parse(JSON.stringify(value));
}

function formatAmountFromRupees(rupees){
  rupees = Number(rupees)||0;
  if(amountUnit==='cr') return '₹' + (rupees/1e7).toLocaleString('en-IN',{maximumFractionDigits:2,minimumFractionDigits:0}) + ' Cr';
  if(amountUnit==='lakh') return '₹' + (rupees/1e5).toLocaleString('en-IN',{maximumFractionDigits:2,minimumFractionDigits:0}) + ' L';
  return '₹' + rupees.toLocaleString('en-IN', {maximumFractionDigits:2});
}
function fmtMoney(n){ return formatAmountFromRupees(Number(n)||0); }
function fmtCr(n){ if(n===null||n===undefined||n==='') return 'TBD'; return formatAmountFromRupees(Number(n)*1e7); }

  </div>`;
}
function fmtDate(d){
  if(!d) return '—';
  const s = String(d).trim();
  // ISO: YYYY-MM-DD (optionally with time component)
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[3]}-${m[2]}-${m[1]}`;
  // Already D-M-Y or DD/MM/YYYY style with slashes -> normalize separator only
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m) return `${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}-${m[3]}`;
  return s;
}
function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }
function esc(s){ if(s===undefined||s===null) return ''; return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

ier's ground holding ponds (28,702 cum capacity) with two 3,000 cum/hr pumps for monsoon dewatering \u2014 part of a package that has already brought noticeable flood relief to the area since 2022."},"work_seed_16":{"stateShare":508500000.0,"centralShare":1491500000.0,"benefitDescription":"815m box-drain and micro-tunnelling project diverting Mogra Nalla flows beneath the Western Railway between Andheri (E) and Andheri (W), addressing chronic water-logging at Andheri Subway, where the existing drain carries only ~30% of design storm flow per IIT-Bombay's hydraulic assessment. 18-month contract period."},"work_seed_17":{"stateShare":45000000.0,"centralShare":405000000.0,"benefitDescription":"Updating and spatially correcting BMC's storm-water drain GIS layer (last surveyed in 2007) across City, Eastern and Western suburbs using ArcGIS, to support planning and maintenance of the SWD network. 36-month completion period, excluding monsoon."},"work_seed_18":{"stateShare":3000000.0,"centralShare":27000000.0,"benefitDescription":"27 satellite phones with docking units for BMC's Disaster Management Department, placed at the Emergency Operations Centre, ward control rooms and other key sites, to keep communication running when conventional networks fail during disasters. 6-month installation, 5 years' comprehensive maintenance and a 6-year pre-paid plan thereafter."},"work_seed_19":{"benefitDescription":"Zone 1 hotspot-flooding remediation \u2014 localized drainage redesign, culvert remodelling and box drains addressing encroached/undersized nallas, chronic silting and inadequate roadside storm drains, among the 137 flood-prone locations identified by PMC."},"work_seed_20":{"benefitDescription":"Zone 5 hotspot-flooding remediation covering Bhavani Peth, Kasba-Vishrambagh and Bibvewadi \u2014 localized drainage redesign, culvert remodelling and box drains addressing the same chronic causes (encroached nallas, undersized drains, silting) as PMC's other zone-wise packages."},"w -2026."},"work_seed_30":{"benefitDescription":"Permeable/porous walkway pavements at seven lake-improvement sites (phased across Year 2 and Year 3) to let storm water infiltrate rather than run off, cutting peak flows around Foxsagar, Pedda Cheruvu, Cherlapally, Saroornagar, Kotha Cheruvu and Chintal lakes. Targeted completion 2024-2026."},"work_seed_31":{"benefitDescription":"Customised urban flood early-warning system for GHMC \u2014 software development, a command centre, field sensors, a LIDAR survey, and three years of hosting/maintenance \u2014 to give accurate, coordinated flood alerts across government agencies, responders and the public. Targeted completion 2023-2026."},"work_seed_32":{"dprAmount":1874300000,"pprAmount":2124000000,"tenderAwardAmount":1874300000,"benefitDescription":"Restoring and connecting spatial channels (khals) to 13 already-desilted main canals, plus a new barrage with pumping station at the Ganga\u2013Tolly's Nullah confluence, to stop tidal river water backing up into the canal system and flooding 31 wards along Tolly's Nullah and 10 along the Churial canals each year."},"work_seed_33":{"dprAmount":3159800000,"pprAmount":2846400000,"tenderAwardAmount":3159800000,"benefitDescription":"New storm-water drain network with onsite detention pits and pumping stations at 14 chronic flood-hotspot locations identified by the Expert Committee, discharging into the river system via peripheral canals to relieve macro-catchment flooding."},"work_seed_34":{"dprAmount":767100000,"pprAmount":600800000,"tenderAwardAmount":767100000,"benefitDescription":"Capacity enhancement of a 2.68km stretch of Kolkata's macro drainage network (part of the city's 200km of century-old arterial storm drains) to restore original hydraulic capacity in a congested core-city area, building on earlier JNNURM-funded upgrades covering 36km."},"work_seed_35":{"dprAmount":332300000,"pprAmount":333100000,"tenderAwardAmount":332300000,"benefitDescription":"Restoration of big wat async function loadAll(){
  DB.components = await loadArr('components');
  DB.dprs = await loadArr('dprs');
  DB.works = await loadWorks();
  DB.timelines = await loadArr('timelines');
  DB.cityProgrammes = await loadArr('cityProgrammes');
  DB.ganttData = await loadGantt();
  DB.budgetMatrix = await loadBudgetMatrix();
  const meRaw = await loadArr('meData');
  DB.meData = (Array.isArray(meRaw) && meRaw.length===0) ? {} : meRaw;
  if(!DB.cityProgrammes.length){
    DB.cityProgrammes = deepClone(CITY_SEED);
    await saveArr('cityProgrammes', DB.cityProgrammes);
  }
  if(!DB.components.length){
    const seed = deepClone(SEED_DATA);
    DB.components = seed.components;
    DB.dprs = seed.dprs;
    // DB.works, DB.ganttData, and DB.budgetMatrix are already loaded/seeded by their own loaders above — don't overwrite them here.
    DB.timelines = seed.timelines;
    await saveArr('components', DB.components);
    await saveArr('dprs', DB.dprs);
    await saveArr('timelines', DB.timelines);
  } else {
    await applyMigrationV2();
    await applyMigrationV3();
    await applyMigrationV4();
  }
}
async function applyMigrationV2(){
  const flag = await loadArr('migrationV2Applied');
  if(flag && flag.applied) return;
  let changed = false;
  const workIdsToSync = new Set();
  DB.works.forEach(w=>{
    const patch = MIGRATION_PATCH_V2.works[w.id];
    if(patch){ Object.assign(w, patch); changed = true; workIdsToSync.add(w.id); }
  });
  DB.dprs.forEach(d=>{
    const patch = MIGRATION_PATCH_V2.dprs[d.id];
    if(patch){ Object.assign(d, patch); changed = true; }
  });
  DB.components.forEach(c=>{
    const patch = MIGRATION_PATCH_V2.components[c.id];
    if(patch){ Object.assign(c, patch); changed = true; }
  });
  if(changed){
    await saveArr('dprs', DB.dprs);
    await saveArr('components', DB.components);
    for(const id of workIdsToSync){
      const w = DB.works.find(x=>x.id===id);
      if(w) await saveWorkItem(w, false);
    }
  }
  try{ await window.storage.set('migrationV2Applied', JSON.stringify({applied:true}), SHARED); }catch(e){}
}

  const flag = await loadArr('migrationV3Applied');
  if(flag && flag.applied) return;
  let changed = false;
  const updateIds = new Set();
  const createIds = new Set();
  DB.works.forEach(w=>{
    const patch = MIGRATION_PATCH_V3.works[w.id];
    if(patch){ Object.assign(w, patch); changed = true; updateIds.add(w.id); }
  });
  DB.dprs.forEach(d=>{
    const patch = MIGRATION_PATCH_V3.dprs[d.id];
    if(patch){ Object.assign(d, patch); changed = true; }
  });
  DB.components.forEach(c=>{
    const patch = MIGRATION_PATCH_V3.components[c.id];
    if(patch){ Object.assign(c, patch); changed = true; }
  });
  (MIGRATION_PATCH_V3.newWorks||[]).forEach(nw=>{
    if(!DB.works.find(w=>w.id===nw.id)){ DB.works.push(deepClone(nw)); changed = true; createIds.add(nw.id); }
  });
  if(changed){
    await saveArr('dprs', DB.dprs);
    await saveArr('components', DB.components);
    for(const id of updateIds){
      const w = DB.works.find(x=>x.id===id);
      if(w) await saveWorkItem(w, false);
    }
    for(const id of createIds){
      const w = DB.works.find(x=>x.id===id);
      if(w) await saveWorkItem(w, true);
    }
  }
  try{ await window.storage.set('migrationV3Applied', JSON.stringify({applied:true}), SHARED); }catch(e){}
}

const BM_STOPWORDS = new Set(['of','the','and','in','to','for','a','an','at','on','with','by','from','–','-','&']);
function bmNormalize(s){
  const cleaned = String(s||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ');
  const words = cleaned.split(/\s+/).filter(w=>w.length>2 && !BM_STOPWORDS.has(w));
  return new Set(words);
}
function bmOverlapScore(a, b){
  if(!a.size || !b.size) return 0;
  let inter = 0;
  a.forEach(w=>{ if(b.has(w)) inter++; });
  return inter / Math.min(a.size, b.size);
}
function matchBudgetMatrixRow(work, cityId){
  const rows = DB.budgetMatrix[cityId];
  if(!rows || !rows.length) return null;
  const workSet = bmNormalize(work.name);
  let best = null, bestScore = 0;
  rows.forEach(r=>{
    const rowSet = bmNormalize((r.name||'') + ' ' + (r.description||''));
    const sc = bmOverlapScore(workSet, rowSet);
    if(sc > bestScore){ bestScore = sc; best = r; }
  });
  return best;
}
function structuralTypePill(type){
  if(!type || type==='—') return `<span class="pill amber">Not specified</span>`;
  if(type==='Structural') return `<span class="pill blue">Structural</span>`;
  if(type==='Non-Structural') return `<span class="pill green">Non-Structural</span>`;
  return `<span class="pill amber">${esc(type)}</span>`;
}
function indicatorScore(ind, entry){
  if(!entry) return null;
  const baseline = Number(entry.baselineValue), target = Number(entry.targetValue), current = Number(entry.currentValue);
  if(entry.baselineValue===undefined||entry.baselineValue===''||entry.targetValue===undefined||entry.targetValue===''||entry.currentValue===undefined||entry.currentValue==='') return null;
  const denom = ind.trend==='+' ? (target-baseline) : (baseline-target);
  if(!denom) return null;
  const numer = ind.trend==='+' ? (current-baseline) : (baseline-current);
  return numer/denom;
}
function scorePill(score){
  if(score===null||score===undefined) return `<span class="pill amber">No data</span>`;
  const pct = (score*100).toFixed(0);
  let cls = 'red';
  if(score>=0.67) cls='green'; else if(score>=0.34) cls='amber';
  return `<span class="pill ${cls}">${pct}%</span>`;
}

function cityFinancial(cityId){
  const comps = componentsForCity(cityId);
  const works = worksForCity(cityId);
  const sanctioned = comps.reduce((s,c)=>s+Number(c.approvedBudget||0),0);
  const utilized = works.reduce((s,w)=> s + (Number(w.financialProgressPct||0)/100)*Number(w.tenderAwardAmount||w.dprAmount||0), 0);
  const avgPhysical = works.length ? works.reduce((s,w)=>s+Number(w.physicalProgressPct||0),0)/works.length : 0;
  return {sanctioned, utilized, avgPhysical, workCount:works.length, compCount:comps.length};
}
function cityApprovalPct(cityId){
  const comps = componentsForCity(cityId);
  if(!comps.length) return 0;
  const totals = comps.map(c=>{
    const t = timelineFor(c.id);
    if(!t) return 0;
    return MILESTONES.filter(m=>t[m.key]).length / MILESTONES.length;
  });
  return (totals.reduce((a,b)=>a+b,0)/totals.length)*100;
}

const MAP_W = 300, MAP_H = 360;
const LON_MIN=68, LON_MAX=98, LAT_MIN=6, LAT_MAX=37;
function project(lat, lng){
  const x = (lng-LON_MIN)/(LON_MAX-LON_MIN) * MAP_W;
  const y = MAP_H - (lat-LAT_MIN)/(LAT_MAX-LAT_MIN) * MAP_H;
  return [x,y];
}
function indiaPath(){
  const pts = MAINLAND_LONLAT.map(([lo,la])=>project(la,lo));
  return 'M ' + pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L ') + ' Z';
}
function statePaths(){
  return STATE_BOUNDARIES.map(s=>{
    const pts = s.points.map(([lo,la])=>project(la,lo));
    const d = 'M ' + pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L ') + ' Z';
    return `<path d="${d}" fill="none" stroke="#B8C7C4" stroke-width="0.6" stroke-linejoin="round"><title>${esc(s.name)}</title></path>`;
  }).join('');
}
function renderMapSvg(){
  const dots = DB.cityProgrammes.map(c=>{
    const [x,y] = project(c.lat,c.lng);
    const color = c.phase===1?'var(--p1)':c.phase===2?'var(--p2)':'var(--p3)';
    const r = c.phase===1?5.5:c.phase===2?4.5:5.5;
    return `<circle class="city-dot" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r}" fill="${color}" onclick="gotoCity('${c.id}')"><title>${esc(c.cityName)} — Phase ${c.phase}${c.ndmfShareCr?' — ₹'+c.ndmfShareCr+' Cr':''}</title></circle>`;
  }).join('');
  return `<svg viewBox="0 0 ${MAP_W} ${MAP_H}" width="100%" style="max-width:300px;">
    <path d="${indiaPath()}" fill="#E4ECEB" stroke="#9FB3AF" stroke-width="1.1"/>
    ${statePaths()}
    ${dots}
  </svg>`;
}

/* ---- Per-city state close-up map ---- */
const CITY_STATE_MAP = {
  'chennai-p1':'Tamilnadu', 'mumbai-p1':'Maharashtra', 'mumbai-p3':'Maharashtra',
  'kolkata-p1':'West Bengal', 'bengaluru-p1':'Karnataka', 'hyderabad-p1':'Telengana',
  'ahmedabad-p1':'Gujarat', 'ahmedabad-p3':'Gujarat', 'pune-p1':'Maharashtra',
  'guwahati-p2':'Assam', 'kanpur-p2':'Uttar Pradesh', 'raipur-p2':'Chhattishgarh',
  'visakhapatnam-p2':'Andhra Pradesh', 'lucknow-p2':'Uttar Pradesh', 'jaipur-p2':'Rajasthan',
  'bhubaneswar-p2':'Odisha', 'thiruvananthapuram-p2':'Kerala', 'bhopal-p2':'Madhya Pradesh',
  'indore-p2':'Madhya Pradesh', 'patna-p2':'Bihar', 'delhi-p3':'Delhi',
};
function projectLocal(lat, lon, bbox, w, h){
  const x = (lon-bbox.lonMin)/(bbox.lonMax-bbox.lonMin) * w;
  const y = h - (lat-bbox.latMin)/(bbox.latMax-bbox.latMin) * h;
  return [x,y];
}
function getStateBBox(points){
  let lonMin=Infinity, lonMax=-Infinity, latMin=Infinity, latMax=-Infinity;
  points.forEach(([lo,la])=>{ if(lo<lonMin)lonMin=lo; if(lo>lonMax)lonMax=lo; if(la<latMin)latMin=la; if(la>latMax)latMax=la; });
  const padLon = (lonMax-lonMin)*0.10 || 0.3, padLat = (latMax-latMin)*0.10 || 0.3;
  return {lonMin:lonMin-padLon, lonMax:lonMax+padLon, latMin:latMin-padLat, latMax:latMax+padLat};
}
function renderCityStateMap(city){
  const stateName = CITY_STATE_MAP[city.id];
  const st = stateName ? STATE_BOUNDARIES.find(s=>s.name===stateName) : null;
  if(!st){
    return `<div class="empty" style="padding:20px 10px;">State boundary not available for this city.</div>`;
  }
  const W=180, H=180;
  const bbox = getStateBBox(st.points);
  const pts = st.points.map(([lo,la])=>projectLocal(la,lo,bbox,W,H));
  const path = 'M ' + pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L ') + ' Z';
  const [cx,cy] = projectLocal(city.lat, city.lng, bbox, W, H);
  const color = city.phase===1?'var(--water)':city.phase===2?'var(--green)':'var(--amber)';
  return `
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:190px;">
      <path d="${path}" fill="#EAF1F0" stroke="#9FB3AF" stroke-width="1.3"/>
      <circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="6" fill="${color}" stroke="#fff" stroke-width="1.6"/>
    </svg>
    <div style="text-align:center;font-size:11.5px;color:var(--muted);margin-top:4px;">${esc(city.cityName)} within <strong>${esc(stateName)}</strong></div>
  `;
}

    benefDirect += Number(w.beneficiariesDirect||0); benefIndirect += Number(w.beneficiariesIndirect||0);
  });
  const totalNdmf = DB.cityProgrammes.reduce((s,c)=>s+Number(c.ndmfShareCr||0),0);
  const uniqueCityCount = new Set(DB.cityProgrammes.map(c=>c.cityName)).size;

  function phaseSection(phase){
    const cities = DB.cityProgrammes.filter(c=>c.phase===phase);
    const phaseTotal = cities.reduce((s,c)=>s+Number(c.ndmfShareCr||0),0);
    const hasUnknown = cities.some(c=>c.ndmfShareCr===null||c.ndmfShareCr===undefined);
    const rows = cities.map(c=>{
      const f = cityFinancial(c.id);
      const appr = cityApprovalPct(c.id);
      return `<tr class="clickable" onclick="gotoCity('${c.id}')">
        <td>${esc(c.cityName)}</td>
        <td class="num">${fmtCr(c.ndmfShareCr)}</td>
        <td class="num">${f.compCount}</td>
        <td class="num">${f.avgPhysical.toFixed(0)}%</td>
        <td class="num">${appr.toFixed(0)}%</td>
      </tr>`;
    }).join('');
    return `
    <div class="card">
      <div class="section-title">${phasePill(phase)} <span style="font-weight:600;">${cities.length} cit${cities.length===1?'y':'ies'}</span>
        <span class="hint">Total NDMF Share: ${phaseTotal? fmtCr(phaseTotal) : '—'}${hasUnknown? ' (some shares TBD)':''}</span>
      </div>
      <table><thead><tr><th>City</th><th class="num">NDMF Share</th><th class="num">Projects</th><th class="num">Physical %</th><th class="num">Approval %</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;
  }

  function phaseOverview(phase){
    const cities = DB.cityProgrammes.filter(c=>c.phase===phase);
    const phaseNdmf = cities.reduce((s,c)=>s+Number(c.ndmfShareCr||0),0);
    const hasUnknown = cities.some(c=>c.ndmfShareCr===null||c.ndmfShareCr===undefined);
    let phaseBudget=0, physSum2=0, physN2=0, apprSum=0;
    cities.forEach(c=>{
      const f = cityFinancial(c.id);
      phaseBudget += f.sanctioned;
      if(f.workCount){ physSum2 += f.avgPhysical; physN2++; }
      apprSum += cityApprovalPct(c.id);
    });
    const avgPhys = physN2 ? physSum2/physN2 : 0;
    const avgAppr = cities.length ? apprSum/cities.length : 0;
    const cls = PHASE_CLASS[phase];
    return `
    <div class="phase-card phase-card-${cls}" onclick="selectDashboardPhase(${phase})">
      <div class="phase-card-head">${phasePill(phase)}<span class="phase-card-count">${cities.length} cit${cities.length===1?'y':'ies'}</span></div>
      <div class="phase-card-stats">
        <div><div class="phase-card-val">${phaseNdmf? fmtCr(phaseNdmf):'—'}${hasUnknown?'*':''}</div><div class="phase-card-lbl">NDMF Share</div></div>
        <div><div class="phase-card-val">${fmtMoney(phaseBudget)}</div><div class="phase-card-lbl">Component Budget</div></div>
        <div><div class="phase-card-val">${avgPhys.toFixed(0)}%</div><div class="phase-card-lbl">Avg Physical</div></div>
        <div><div class="phase-card-val">${avgAppr.toFixed(0)}%</div><div class="phase-card-lbl">Avg Approval</div></div>
      </div>
      ${hasUnknown? `<div class="phase-card-note">*some NDMF shares still TBD</div>` : ''}
    </div>`;
  }

  main.innerHTML = `
    <div class="dash-dark">
    <div class="page-head">
      <div><h1>Urban Flood Risk Management Programme (UFRMP)</h1><p>Flood mitigation works across all cities and phases funded under the NDMF</p></div>
    </div>
    ${renderUnitToggle()}
    <div class="kpi-row">
      <div class="kpi"><div class="label">Total NDMF Allocation</div><div class="value">${fmtCr(totalNdmf)}</div><div class="sub">across ${uniqueCityCount} cities (${DB.cityProgrammes.length} city programmes)</div></div>
      <div class="kpi"><div class="label">Approved Component Budget</div><div class="value">${fmtMoney(totalBudget)}</div><div class="sub">from components added so far</div></div>
      <div class="kpi"><div class="label">Utilized (est.)</div><div class="value">${fmtMoney(totalUtil)}</div></div>
      <div class="kpi"><div class="label">Avg. Physical Progress</div><div class="value">${(physN?physSum/physN:0).toFixed(1)}%</div></div>
      <div class="kpi"><div class="label">Storm Water Drain</div><div class="value">${drainAch.toLocaleString()} m</div><div class="sub">of ${drainPlan.toLocaleString()} m planned</div></div>
      <div class="kpi"><div class="label">Beneficiaries</div><div class="value">${(benefDirect+benefIndirect).toLocaleString()}</div><div class="sub">${benefDirect.toLocaleString()} direct · ${benefIndirect.toLocaleString()} indirect</div></div>
    </div>
    <div class="card">
      <div class="section-title">Cities & Programmes <span class="hint">add a new city/programme to track it across the dashboard, map, and its own data-entry page</span>
        <button class="btn" id="toggleAddCityBtn" style="margin-left:10px;padding:6px 12px;font-size:12px;">${showAddCityForm ? 'Cancel' : '+ Add City / Programme'}</button>
      </div>
      ${showAddCityForm ? `
      <form id="fAddCity">
        <div class="grid2">
          <div class="field"><label>City Name</label><input required type="text" name="cityName" placeholder="e.g. Nagpur"></div>
          <div class="field"><label>Phase</label><select name="phase"><option value="1">Phase 1</option><option value="2">Phase 2</option><option value="3">Phase 3</option></select></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Latitude</label><input required type="number" step="0.0001" name="lat" placeholder="e.g. 21.1458"></div>
          <div class="field"><label>Longitude</label><input required type="number" step="0.0001" name="lng" placeholder="e.g. 79.0882"></div>
        </div>
        <div class="grid2">
          <div class="field"><label>NDMF Share (₹ Cr)</label><input type="number" step="0.01" name="ndmfShareCr"></div>
          <div class="field"><label>State Share (₹ Cr)</label><input type="number" step="0.01" name="stateShareCr"></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Approved Projects Amount (₹ Cr)</label><input type="number" step="0.01" name="approvedProjectsAmountCr"></div>
          <div class="field"><label>NDRF Share (₹ Cr)</label><input type="number" step="0.01" name="ndrfShareCr"></div>
        </div>
        <div class="form-actions"><button class="btn" type="submit">Add City / Programme</button></div>
      </form>` : ''}
    </div>
    <div class="card">
      <div class="section-title">Programme Overview by Phase <span class="hint">each phase runs its own city set and funding envelope — click a card to jump to its city list below. Ahmedabad and Mumbai appear under both Phase 1 and Phase 3, so phase counts don't sum to the total number of distinct cities.</span></div>
      <div class="phase-overview-grid">
        ${phaseOverview(1)}
        ${phaseOverview(2)}
        ${phaseOverview(3)}
      </div>
    </div>
    <div class="card">
      <div class="section-title">All Cities on the Map <span class="hint">click a dot or a row below to open that city's page</span></div>

          <option value="2" ${dashboardPhaseSelected===2?'selected':''}>Phase 2</option>

        </select>
      </div>

    </div>
    </div>
  `;
  const phaseHost = document.getElementById('phaseTableHost');
  phaseHost.innerHTML = phaseSection(dashboardPhaseSelected);
  document.getElementById('phaseSelect').addEventListener('change', e=>{
    dashboardPhaseSelected = Number(e.target.value);
    phaseHost.innerHTML = phaseSection(dashboardPhaseSelected);
  });
  document.getElementById('toggleAddCityBtn').addEventListener('click', ()=>{
    showAddCityForm = !showAddCityForm;
    renderDashboard();
  });
  const fAddCity = document.getElementById('fAddCity');
  if(fAddCity){
    fAddCity.addEventListener('submit', async e=>{
      e.preventDefault(); const fd = new FormData(e.target);
      const cityName = (fd.get('cityName')||'').trim();
      const phase = Number(fd.get('phase'))||1;
      if(!cityName){ return; }
      let slug = cityName.toLowerCase().replace(/[^a-z]/g,'') + '-p' + phase;
      let id = slug, n = 2;
      while(DB.cityProgrammes.find(c=>c.id===id)){ id = slug + '-' + n; n++; }
      const city = {
        id, cityName, phase,
        ndmfShareCr: fd.get('ndmfShareCr')===''?null:Number(fd.get('ndmfShareCr')),
        stateShareCr: fd.get('stateShareCr')===''?null:Number(fd.get('stateShareCr')),
        approvedProjectsAmountCr: fd.get('approvedProjectsAmountCr')===''?null:Number(fd.get('approvedProjectsAmountCr')),
        ndrfShareCr: fd.get('ndrfShareCr')===''?null:Number(fd.get('ndrfShareCr')),
        lat: Number(fd.get('lat')), lng: Number(fd.get('lng'))
      };
      DB.cityProgrammes.push(city);
      const ok = await saveArr('cityProgrammes', DB.cityProgrammes);
      if(ok){ showAddCityForm = false; gotoCity(id); }
    });
  }
}

function renderCity(){
  buildSidebarCityList();

  const main = document.getElementById('main');
  if(!city){ gotoDashboard(); return; }
  const tabs = [['overview','Overview'],['components','Components & DPRs'],['gantt','Implementation Gantt'],['budgetmatrix','Budget Matrix'],['timeline','Approval Timeline'],['me','Monitoring & Evaluation'],['entry','Data Entry']];

  main.innerHTML = `

  const host = document.getElementById('cityContent');

  else if(ROUTE.cityTab==='me') renderCityME(city, host);
  else if(ROUTE.cityTab==='entry') renderCityEntry(city, host);
}

async function renderCityWorkDetail(city, host){
  const c = DB.components.find(x=>x.id===ROUTE.componentId);
  const d = DB.dprs.find(x=>x.id===ROUTE.dprId);
  const w = DB.works.find(x=>x.id===ROUTE.workId);
  if(!c||!d||!w){ setCityDrill({workId:null}); return; }
  host.innerHTML = `<div class="empty">Loading component…</div>`;
  const photos = await loadPhotos(w.id);
  const before = photos.filter(p=>p.category==='before');
  const after = photos.filter(p=>p.category==='after');
  const bimonthly = photos.filter(p=>p.category==='bimonthly').sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  function diffCell(base,v){
    v = Number(v); if(!v && v!==0) return '—';
    if(!base) return fmtMoney(v);
    const diff = v-base, pct = base? diff/base*100:0, cls = diff>0?'up':(diff<0?'down':''), sign = diff>0?'+':'';
    return `${fmtMoney(v)} <span style="font-weight:600;color:${diff>0?'var(--red)':diff<0?'var(--green)':'inherit'}">(${sign}${pct.toFixed(1)}%)</span>`;
  }

/* ---- Monitoring & Evaluation (scoped to a city) ---- */
function renderCityME(city, host){
  const works = worksForCity(city.id);
  const grouped = {};
  UFRM_MATRIX.forEach(row=>{ grouped[row.code] = { row, items: [] }; });
  const unclassified = [];
  works.forEach(w=>{
    const m = classifyWorkToMatrix(w);
    if(m) grouped[m.code].items.push(w);
    else unclassified.push(w);
  });
  const measures = [...new Set(UFRM_MATRIX.map(r=>r.measure))];
  let matrixHtml = measures.map(measure=>{
    const rowsForMeasure = UFRM_MATRIX.filter(r=>r.measure===measure);
    const blocks = rowsForMeasure.map(r=>{
      const items = grouped[r.code].items;
      const itemRows = items.length ? items.map(w=>`
        <div class="comp-row" style="cursor:default;padding:9px 4px;">
          <div class="comp-main">
            <div class="name" style="font-size:13px;">${esc(w.name)}</div>
            <div class="meta">${statusPill(w.status)} · ${Number(w.physicalProgressPct||0).toFixed(0)}% physical</div>
          </div>
        </div>`).join('') : `<div class="empty" style="padding:8px 0;font-size:12.5px;">No components in this city currently fall under this category.</div>`;
      return `
      <div style="margin-bottom:16px;padding:12px 14px;background:#F6F9F8;border:1px solid var(--line);border-radius:8px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;">
          <div><strong style="font-size:13px;">${esc(r.component)}</strong> <span class="mono" style="font-size:11px;color:var(--muted);">(${r.outputCode} · ${r.code})</span></div>
          <span class="pill blue">${items.length} component${items.length===1?'':'s'}</span>
        </div>
        <div style="font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.5;">${esc(r.activities)}</div>
        <div style="margin-top:8px;">${itemRows}</div>
      </div>`;
    }).join('');
    return `<div class="card"><div class="section-title">${esc(measure)}</div>${blocks}</div>`;
  }).join('');

  if(unclassified.length){
    matrixHtml += `<div class="card"><div class="section-title">Not yet categorised<span class="hint">didn't match a matrix category by name — review manually</span></div>
      ${unclassified.map(w=>`<div class="comp-row" style="cursor:default;"><div class="comp-main"><div class="name">${esc(w.name)}</div><div class="meta">${statusPill(w.status)}</div></div></div>`).join('')}
    </div>`;
  }

  const me = meDataFor(city.id);
  const groups = [...new Set(ME_INDICATORS.map(i=>i.group))];
  let scoreHtml = groups.map(g=>{
    const inds = ME_INDICATORS.filter(i=>i.group===g);
    const rows = inds.map(ind=>{
      const entry = me[ind.code];
      const score = indicatorScore(ind, entry);
      return `<tr>
        <td class="mono">${esc(ind.code)}</td>
        <td>${esc(ind.indicator)}<div style="font-size:10.5px;color:var(--muted);margin-top:3px;">Unit: ${esc(ind.unit)} · Trend: ${ind.trend==='+'?'higher is better':'lower is better'} · Weight ${ind.weight}</div></td>
        <td class="num mono">${entry&&entry.baselineValue!==''&&entry.baselineValue!==undefined? esc(entry.baselineValue):'—'}</td>
        <td class="num mono">${entry&&entry.targetValue!==''&&entry.targetValue!==undefined? esc(entry.targetValue):'—'}</td>
        <td class="num mono">${entry&&entry.currentValue!==''&&entry.currentValue!==undefined? esc(entry.currentValue):'—'}</td>
        <td class="num">${scorePill(score)}</td>
      </tr>`;
    }).join('');
    return `
    <div class="card">
      <div class="section-title">${esc(g)}<span class="hint">${esc(inds[0].name)}</span></div>
      <table><thead><tr><th>Code</th><th>Indicator</th><th class="num">Baseline</th><th class="num">Target</th><th class="num">Current</th><th class="num">Score</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;
  }).join('');

  host.innerHTML = `
    <div class="card">
      <div class="section-title">Component Matrix Coverage<span class="hint">${esc(city.cityName)}'s components mapped against the UFRM Component Matrix — auto-matched by name/description</span></div>
    </div>
    ${matrixHtml}
    <div class="card">
      <div class="section-title">Outcome &amp; Output Indicator Scorecard<span class="hint">19 indicators across 1 impact, 3 outcomes and 11 outputs — enter baseline/target/current from Data Entry</span></div>
    </div>
    ${scoreHtml}
  `;
}

/* ---- Approval Timeline (scoped to a city) ---- */
const MILESTONES = [
  { key:'rfpSentDate', label:'Project Initiated — RFP sent to Corporation' },
  { key:'firstProposalReceivedDate', label:'First Proposal Received from Corporation' },
  { key:'tac1Date', label:'1st TAC Meeting', comments:'tac1Comments', commentsLabel:'1st TAC Comments' },
  { key:'revisedProposalDate', label:'Revised Proposal Submitted' },
  { key:'tac2Date', label:'2nd TAC Meeting', comments:'tac2Comments', commentsLabel:'2nd TAC Comments' },
  { key:'finalSubmissionDate', label:'Final Submission' },
  { key:'sentToMhaDate', label:'Sent to MHA' },
  { key:'appraisalCommitteeMeetingDate', label:'Appraisal Committee Meeting' },
  { key:'scNecMeetingDate', label:'SC-NEC Meeting' },
  { key:'hlcMeetingDate', label:'HLC Meeting' },
  { key:'mhaTorSentDate', label:'MHA sent Terms of Reference for Acceptance' },
  { key:'cityTorAcceptedDate', label:'City sent Acceptance of Terms of Reference' },
  { key:'doeSanctionDate', label:'Amount Sanctioned by Department of Expenditure (DoE)' },
  { key:'mhaConfirmationToNdmaDate', label:'MHA Confirmation to NDMA' },
  { key:'firstInstallmentDate', label:'1st Instalment Released', installment:1 },
  { key:'ucAfterFirstDate', label:'UC Submitted — after ≥75% utilisation of 1st Instalment' },
  { key:'secondInstallmentDate', label:'2nd Instalment Released', installment:2 },
  { key:'ucAfterSecondDate', label:'UC Submitted — after ≥75% utilisation of 2nd Instalment' },
  { key:'thirdInstallmentDate', label:'3rd (Final) Instalment Released', installment:3 },
];
const INSTALLMENT_RATIO = {1:30, 2:40, 3:30};
const INSTALLMENT_AMOUNT_FIELD = {1:'firstInstallmentAmount', 2:'secondInstallmentAmount', 3:'thirdInstallmentAmount'};

function renderCityTimeline(city, host){
  if(ROUTE.componentId){ renderCityTimelineDetail(city, host); return; }
  const comps = componentsForCity(city.id);
  let rows = comps.map(c=>{
    const t = timelineFor(c.id);
    const done = t? MILESTONES.filter(m=>t[m.key]).length : 0;
    const pct = (done/MILESTONES.length*100);
    return `<div class="comp-row" onclick="setCityDrill({componentId:'${c.id}'})">
      <div class="comp-main"><div class="name">${esc(c.name)}</div><div class="meta">${t && t.firstInstallmentDate? 'First instalment released' : 'Approval process in progress'}</div></div>
      <div class="comp-bars"><div><div class="barlabel"><span>Approval Milestones</span><span>${done}/${MILESTONES.length}</span></div>${waveBar(pct)}</div></div>
      <div class="comp-figs"><div class="big">${pct.toFixed(0)}%</div><div class="small">stages complete</div></div>
    </div>`;
  }).join('') || `<div class="empty">No projects for ${esc(city.cityName)} yet — add one from Data Entry first.</div>`;
  host.innerHTML = `<div class="card"><div class="section-title">Approval Timelines — ${esc(city.cityName)}</div>${rows}</div>`;
}
function renderCityTimelineDetail(city, host){
  const c = DB.components.find(x=>x.id===ROUTE.componentId);
  if(!c){ setCityDrill({componentId:null}); return; }
  const t = timelineFor(c.id) || {};
  const ndmfRupees = (city.ndmfShareCr!==null && city.ndmfShareCr!==undefined) ? Number(city.ndmfShareCr)*1e7 : null;

  let stepsHtml = MILESTONES.map(m=>{
    const dateVal = t[m.key]; const isDone = !!dateVal;
    let extra = '';
    if(m.comments && t[m.comments]) extra += `<button class="step-toggle" onclick="this.nextElementSibling.classList.toggle('show')">view comments ▾</button><div class="step-comments">${esc(t[m.comments])}</div>`;
    else if(m.comments) extra += `<div class="step-extra">No comments recorded.</div>`;
    if(m.installment){
      const ratio = INSTALLMENT_RATIO[m.installment];
      const amtField = INSTALLMENT_AMOUNT_FIELD[m.installment];
      const recorded = Number(t[amtField]||0);
      const suggested = ndmfRupees!==null ? ndmfRupees*ratio/100 : null;
      if(recorded){
        const pctOfNdmf = ndmfRupees ? (recorded/ndmfRupees*100) : null;
        extra += `<div class="step-extra mono">Amount released: ${fmtMoney(recorded)}${pctOfNdmf!==null? ` · ${pctOfNdmf.toFixed(1)}% of NDMF Share (target ${ratio}%)` : ''}</div>`;
      } else if(isDone){
        extra += `<div class="step-extra mono">Amount not yet recorded${suggested!==null? ` — expected ~${fmtMoney(suggested)} (${ratio}% of NDMF Share)` : ''}</div>`;
      } else if(suggested!==null){
        extra += `<div class="step-extra mono">Planned: ${ratio}% of NDMF Share ≈ ${fmtMoney(suggested)}</div>`;
      } else {
        extra += `<div class="step-extra">Add this city's NDMF Share (Data Entry → Edit City Programme) to see the planned amount.</div>`;
      }
    }
    return `<div class="step ${isDone?'done':''}"><div class="step-dot"></div>
      <div class="step-head"><div class="step-title">${m.label}</div><div class="step-date ${isDone?'':'pending'}">${isDone? fmtDate(dateVal):'Pending'}</div></div>
      ${extra}
    </div>`;
  }).join('');

  const otherEvents = (t.otherEvents||[]).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const otherEventsHtml = otherEvents.length ? otherEvents.map(ev=>`
    <div class="comp-row" style="cursor:default;">
      <div class="comp-main">
        <div class="name">${esc(ev.eventName)}</div>
        <div class="meta">${fmtDate(ev.date)}</div>
        ${ev.remarks? `<div style="font-size:12.5px;color:var(--muted);margin-top:6px;line-height:1.5;">${esc(ev.remarks)}</div>` : ''}
      </div>
    </div>`).join('') : `<div class="empty">No other events or remarks recorded yet. Add them from Data Entry → Approval Timeline.</div>`;

  host.innerHTML = `
    <div class="crumb"><span onclick="setCityDrill({componentId:null})">${esc(city.cityName)} timelines</span> / ${esc(c.name)}</div>
    ${renderUnitToggle()}
    <div class="card"><div class="section-title">Approval &amp; Funding Milestones — ${esc(c.name)}<span class="hint">Instalments released in a 30% : 40% : 30% ratio of the NDMF Share</span></div><div class="stepper">${stepsHtml}</div></div>
    <div class="card">
      <div class="section-title">MHA Observations</div>
      <div class="obs-box ${t.mhaObservations?'':'empty-note'}">${t.mhaObservations? esc(t.mhaObservations) : 'No MHA observations recorded yet.'}</div>
    </div>
    <div class="card">
      <div class="section-title">DoE Observations</div>
      <div class="obs-box ${t.doeObservations?'':'empty-note'}">${t.doeObservations? esc(t.doeObservations) : 'No DoE observations recorded yet.'}</div>
    </div>
    <div class="card">
      <div class="section-title">Other Events &amp; Remarks</div>
      ${otherEventsHtml}
    </div>
  `;
}

    <form id="fOtherEvent">
      <div class="grid3">
        <div class="field"><label>Event Name</label><input required name="eventName" placeholder="e.g. Site visit by NDMA team"></div>
        <div class="field"><label>Date</label><input required type="date" name="date"></div>
        <div class="field"><label>Remarks</label><input name="remarks" placeholder="Optional detail"></div>
      </div>
      <div class="form-actions"><button class="btn ghost small" type="submit">+ Add Event</button></div>
    </form>
    <div id="otherEventsList" style="margin-top:10px;"></div>`;
    const tCompSel = document.getElementById('tCompSel');
    const fT = document.getElementById('fTimeline');
    function renderOtherEvents(){
      const t = timelineFor(tCompSel.value) || {};
      const list = document.getElementById('otherEventsList');
      const events = (t.otherEvents||[]).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
      if(!events.length){ list.innerHTML = `<div class="empty" style="padding:10px 0;">No other events added yet for this component.</div>`; return; }
      list.innerHTML = events.map(ev=>`
        <div class="comp-row">
          <div class="comp-main">
            <div class="name">${esc(ev.eventName)}</div>
            <div class="meta">${fmtDate(ev.date)}${ev.remarks? ' · '+esc(ev.remarks):''}</div>
          </div>
          <button class="btn ghost small" onclick="deleteOtherEvent('${tCompSel.value}','${ev.id}')">Remove</button>
        </div>`).join('');
    }
    function updateInstHints(){
      const comp = DB.components.find(c=>c.id===tCompSel.value);
      const city = comp ? getCity(comp.cityProgrammeId) : null;
      const ndmf = city && city.ndmfShareCr!==null && city.ndmfShareCr!==undefined ? Number(city.ndmfShareCr)*1e7 : null;
      [1,2,3].forEach(n=>{
        const hintEl = document.getElementById('instHint'+n);
        if(!hintEl) return;
        hintEl.value = ndmf!==null ? fmtMoney(ndmf*INSTALLMENT_RATIO[n]/100) : 'add NDMF Share first';
      });
    }
    function prefill(){
      const t = timelineFor(tCompSel.value) || {};
      MILESTONES.forEach(m=>{
        const inp = fT.querySelector(`[name="${m.key}"]`); if(inp) inp.value = t[m.key]||'';
        if(m.comments){ const c = fT.querySelector(`[name="${m.comments}"]`); if(c) c.value = t[m.comments]||''; }
      });
      fT.querySelector('[name="mhaObservations"]').value = t.mhaObservations||'';
      fT.querySelector('[name="doeObservations"]').value = t.doeObservations||'';
      fT.querySelector('[name="firstInstallmentAmount"]').value = t.firstInstallmentAmount||'';
      fT.querySelector('[name="secondInstallmentAmount"]').value = t.secondInstallmentAmount||'';
      fT.querySelector('[name="thirdInstallmentAmount"]').value = t.thirdInstallmentAmount||'';
      updateInstHints();
      renderOtherEvents();
    }
    if(tCompSel.value){ tCompSel.addEventListener('change', prefill); prefill(); }
    fT.addEventListener('submit', async e=>{
      e.preventDefault(); const fd = new FormData(fT);
      const componentId = fd.get('componentId');
      if(!componentId){ showMsg('Add a project first.', false); return; }
      let rec = timelineFor(componentId);
      if(!rec){ rec = { id: uid('tl'), componentId }; DB.timelines.push(rec); }
      MILESTONES.forEach(m=>{ rec[m.key] = fd.get(m.key)||''; if(m.comments) rec[m.comments] = fd.get(m.comments)||''; });
      rec.mhaObservations = fd.get('mhaObservations')||'';
      rec.doeObservations = fd.get('doeObservations')||'';
      rec.firstInstallmentAmount = Number(fd.get('firstInstallmentAmount'))||0;
      rec.secondInstallmentAmount = Number(fd.get('secondInstallmentAmount'))||0;
      rec.thirdInstallmentAmount = Number(fd.get('thirdInstallmentAmount'))||0;
      const ok = await saveArr('timelines', DB.timelines);
      if(ok) render();
      showMsg(ok?'Timeline saved.':'Could not save — try again.', ok);
    });

    const fOtherEvent = document.getElementById('fOtherEvent');
    fOtherEvent.addEventListener('submit', async e=>{
      e.preventDefault(); const fd = new FormData(fOtherEvent);
      const componentId = tCompSel.value;
      if(!componentId){ showMsg('Pick a project first.', false); return; }
      let rec = timelineFor(componentId);
      if(!rec){ rec = { id: uid('tl'), componentId }; DB.timelines.push(rec); }
      if(!rec.otherEvents) rec.otherEvents = [];
      rec.otherEvents.push({ id: uid('ev'), eventName: fd.get('eventName'), date: fd.get('date'), remarks: fd.get('remarks')||'' });
      const ok = await saveArr('timelines', DB.timelines);
      fOtherEvent.reset();
      if(ok) render(); else renderOtherEvents();
      showMsg(ok?'Event added.':'Could not save — try again.', ok);
    });
  }

  if(cityEntryTab==='me'){
    const me = meDataFor(city.id);
    const groups = [...new Set(ME_INDICATORS.map(i=>i.group))];
    const rowsHtml = groups.map(g=>{
      const inds = ME_INDICATORS.filter(i=>i.group===g);
      const trs = inds.map(ind=>{
        const e = me[ind.code] || {};
        return `<tr>
          <td class="mono">${esc(ind.code)}</td>
          <td style="max-width:260px;font-size:12.5px;">${esc(ind.indicator)}<div style="font-size:10px;color:var(--muted);margin-top:2px;">${esc(ind.unit)}</div></td>
          <td><input class="me-input" data-code="${ind.code}" data-field="baselineValue" type="text" value="${esc(e.baselineValue!==undefined?e.baselineValue:'')}" style="width:90px;padding:6px 7px;"></td>
          <td><input class="me-input" data-code="${ind.code}" data-field="targetValue" type="text" value="${esc(e.targetValue!==undefined?e.targetValue:'')}" style="width:90px;padding:6px 7px;"></td>
          <td><input class="me-input" data-code="${ind.code}" data-field="currentValue" type="text" value="${esc(e.currentValue!==undefined?e.currentValue:'')}" style="width:90px;padding:6px 7px;"></td>
        </tr>`;
      }).join('');
      return `<div style="margin-bottom:16px;">
        <div style="font-weight:600;font-size:12.5px;margin-bottom:6px;">${esc(g)}</div>
        <table><thead><tr><th>Code</th><th>Indicator</th><th class="num">Baseline</th><th class="num">Target</th><th class="num">Current</th></tr></thead>
        <tbody>${trs}</tbody></table>
      </div>`;
    }).join('');

    fh.innerHTML = `
    <div class="grid3">
      <div class="field"><label>Baseline Date (applies to all indicators)</label><input type="date" id="meBaselineDate" value="${esc(me.__baselineDate||'')}"></div>
      <div class="field"><label>Target Date (applies to all indicators)</label><input type="date" id="meTargetDate" value="${esc(me.__targetDate||'')}"></div>
      <div class="field"><label>Current Evaluation Date</label><input type="date" id="meCurrentDate" value="${esc(me.__currentDate||'')}"></div>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-top:-6px;">Enter baseline and target once when setting up the framework. At each evaluation cycle, only update the Current column and Evaluation Date.</p>
    ${rowsHtml}
    <div class="form-actions"><button class="btn" id="saveMeBtn" type="button">Save Monitoring &amp; Evaluation Data</button></div>
    `;
    document.getElementById('saveMeBtn').addEventListener('click', async ()=>{
      const rec = meDataFor(city.id);
      rec.__baselineDate = document.getElementById('meBaselineDate').value;
      rec.__targetDate = document.getElementById('meTargetDate').value;
      rec.__currentDate = document.getElementById('meCurrentDate').value;
      fh.querySelectorAll('.me-input').forEach(inp=>{
        const code = inp.dataset.code, field = inp.dataset.field;
        if(!rec[code]) rec[code] = {};
        rec[code][field] = inp.value;
      });
      const ok = await saveMeData();
      if(ok) render();
      showMsg(ok?'Monitoring & Evaluation data saved.':'Could not save — try again.', ok);
    });
  }

  if(cityEntryTab==='programme'){
    const isP3 = city.phase===3;
    const stateRatioLabel = isP3 ? '40% of total (60:40 NDMF:State)' : '10% of total (90:10 NDMF:State)';
    function deriveStateShare(ndmf){
      if(ndmf===null||ndmf===undefined||ndmf==='') return null;
      const n = Number(ndmf);
      return isP3 ? (n*(40/60)) : (n/9);
    }
    const autoStateShare = deriveStateShare(city.ndmfShareCr);
    fh.innerHTML = `
    <form id="fProgramme">
      <div class="grid3">
        <div class="field"><label>City Name</label><input disabled value="${esc(city.cityName)}"></div>
        <div class="field"><label>Phase</label><input disabled value="Phase ${city.phase}"></div>
        <div class="field"><label>NDMF Share (₹ Crore)</label><input type="number" step="0.01" name="ndmfShareCr" id="pgNdmf" value="${city.ndmfShareCr!==null?city.ndmfShareCr:''}" placeholder="e.g. 500"></div>
      </div>
      <div class="grid3">
        <div class="field"><label>State Share — ${stateRatioLabel} (₹ Crore)</label><input type="number" step="0.01" name="stateShareCr" id="pgState" value="${city.stateShareCr!==null&&city.stateShareCr!==undefined?city.stateShareCr:''}" placeholder="e.g. ${autoStateShare!==null?autoStateShare.toFixed(2):'50'}"></div>
        <div class="field"><label>Approved Projects Amount (₹ Crore)</label><input type="number" step="0.01" name="approvedProjectsAmountCr" value="${city.approvedProjectsAmountCr!==null&&city.approvedProjectsAmountCr!==undefined?city.approvedProjectsAmountCr:''}" placeholder="Total value of approved projects"></div>
        <div class="field"><label>NDRF Share (₹ Crore)</label><input type="number" step="0.01" name="ndrfShareCr" value="${city.ndrfShareCr!==null&&city.ndrfShareCr!==undefined?city.ndrfShareCr:''}" placeholder="National Disaster Response Fund share"></div>
      </div>
      <p style="font-size:12px;color:var(--muted);">${isP3? 'Phase 3 uses a 60:40 NDMF-to-State funding split, unlike the 90:10 split in Phase 1 and 2.' : 'Phase 1 and 2 use a 90:10 NDMF-to-State funding split.'} State Share auto-fills as a suggestion when you update NDMF Share, but you can override it. Approved Projects Amount and NDRF Share are entered independently.</p>
      <div class="form-actions"><button class="btn" type="submit">Save Programme Figures</button></div>
    </form>`;
    const pgNdmf = document.getElementById('pgNdmf'), pgState = document.getElementById('pgState');
    pgNdmf.addEventListener('input', ()=>{
      if(pgNdmf.value!=='') pgState.value = deriveStateShare(pgNdmf.value).toFixed(2);
    });
    document.getElementById('fProgramme').addEventListener('submit', async e=>{
      e.preventDefault(); const fd = new FormData(e.target);
      city.ndmfShareCr = fd.get('ndmfShareCr')===''? null : Number(fd.get('ndmfShareCr'));
      city.stateShareCr = fd.get('stateShareCr')===''? null : Number(fd.get('stateShareCr'));
      city.approvedProjectsAmountCr = fd.get('approvedProjectsAmountCr')===''? null : Number(fd.get('approvedProjectsAmountCr'));
      city.ndrfShareCr = fd.get('ndrfShareCr')===''? null : Number(fd.get('ndrfShareCr'));
      const ok = await saveArr('cityProgrammes', DB.cityProgrammes);
      if(ok) render();
      showMsg(ok?'Programme figures updated.':'Could not save — try again.', ok);
    });
  }
}
function showMsg(text, ok=true){
  const m = document.getElementById('msgBox'); if(!m) return;
  if(PERSISTENCE_MODE === 'none') text += ok ? ' (saved for this session only — see notice above)' : ' (Persistent storage is unavailable in this view — see the notice at the top of the page.)';
  m.textContent = text; m.className = 'msg show ' + (ok?'ok':'err');
  setTimeout(()=>{ m.classList.remove('show'); }, ok?3200:7000);
}

/* ---------------------------------------------------------------
   ROUTER
--------------------------------------------------------------- */
function render(){
  if(ROUTE.page==='dashboard') renderDashboard();
  else if(ROUTE.page==='city') renderCity();
}

(async function init(){
  document.getElementById('main').innerHTML = '<div class="empty">Loading programme data…</div>';
  showStorageBanner();
  showFileProtocolBanner();
  await loadAll();
  render();
})();
</script>
</body>
</html>
